<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot Integration - Custom LLM</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- Landing Page Demo -->
    <div class="hero">
        <h1>Minh Châu - Tâm Lý Trị Liệu</h1>
        <p>Kết nối trí tuệ và trái tim, kiến tạo cuộc sống hạnh phúc và thấu cảm. Click vào biểu tượng góc dưới cùng để trò chuyện cùng trợ lý ảo AI chuyên biệt.</p>
    </div>

    <!-- Chat Toggle Button -->
    <button class="chat-toggle" id="chat-toggle" aria-label="Open chat">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
        </svg>
    </button>

    <!-- Chat Window Container -->
    <div class="chat-window" id="chat-window">
        <!-- Chat Header -->
        <div class="chat-header">
            <div class="header-info">
                <div class="bot-avatar">MC</div>
                <div class="bot-details">
                    <span class="bot-name">Trợ lý AI - Minh Châu</span>
                    <span class="bot-status">
                        <span class="status-dot"></span> Online
                    </span>
                </div>
            </div>
            <div class="header-actions">
                <button class="action-btn" id="refresh-btn" aria-label="Refresh chat">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                </button>
                <button class="action-btn" id="close-btn" aria-label="Close chat">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Chat Body (Messages) -->
        <div class="chat-body" id="chat-body">
            <!-- Messages injected dynamically by JS -->
        </div>

        <!-- Chat Footer (Input) -->
        <div class="chat-footer">
            <input type="text" class="chat-input" id="chat-input" placeholder="Nhập tin nhắn..." autocomplete="off">
            <button class="send-btn" id="send-btn" aria-label="Send message" disabled>
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- Script loaded as module specifically for OpenAI SDK compatibility -->
    <script type="module" src="./script.js"></script>
</body>
</html>

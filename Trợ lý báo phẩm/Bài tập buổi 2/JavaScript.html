<script>
  // ============================================
  // JAVASCRIPT.html - Client-side Logic
  // Quản Lý Nguồn Thực Phẩm
  // ============================================

  // ============================================
  // DEEP STATE - Quản lý dữ liệu 3 chiều
  // ============================================

  var STATE = {
    // Bảng Báo giá
    baoGia: [],

    // Thực đơn: menuData[dayIndex][mealKey] = [ {name, nguon, qty, unit, ...} ]
    menuData: {},

    // Navigation state
    currentDay: 0,
    currentMeal: 'sang',

    // Headcount from Google Sheets
    headcount: {},

    // Tiêu chuẩn theo từng ngày × buổi (nhập thủ công)
    // tieuChuan[dayIdx][mealKey] = số tiền
    tieuChuan: {},

    // Constants
    DAYS: ['Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7', 'Chủ nhật'],
    MEALS: ['sang', 'trua', 'chieu'],
    MEAL_NAMES: { sang: 'Sáng', trua: 'Trưa', chieu: 'Chiều' },
    DEFAULT_TIEU_CHUAN: { sang: 25000, trua: 35000, chieu: 25000 },
    PROTECTED_ITEMS: ['Chất đốt', 'Tạp chi gia vị']
  };

  // Initialize empty menu data
  function initMenuData() {
    for (var d = 0; d < 7; d++) {
      if (!STATE.menuData[d]) STATE.menuData[d] = {};
      if (!STATE.tieuChuan[d]) STATE.tieuChuan[d] = {};
      STATE.MEALS.forEach(function (m) {
        if (!STATE.menuData[d][m]) STATE.menuData[d][m] = [];
        if (STATE.tieuChuan[d][m] === undefined) STATE.tieuChuan[d][m] = STATE.DEFAULT_TIEU_CHUAN[m];
      });
    }

    // Ensure protected items exist in BaoGia
    var hasChatDot = false;
    var hasTapChi = false;
    STATE.baoGia.forEach(function (it) {
      if (it.name === 'Chất đốt') hasChatDot = true;
      if (it.name === 'Tạp chi gia vị') hasTapChi = true;
    });
    if (!hasChatDot) STATE.baoGia.push({ name: 'Chất đốt', unit: 'kg', marketPrice: 15000, selfPrice: 15000 });
    if (!hasTapChi) STATE.baoGia.push({ name: 'Tạp chi gia vị', unit: 'gói', marketPrice: 0, selfPrice: 0 });
  }
  initMenuData();

  // ============================================
  // UTILITY
  // ============================================

  function formatVND(n) {
    if (isNaN(n) || n === null || n === undefined) return '0';
    return new Intl.NumberFormat('vi-VN').format(Math.round(n));
  }

  // So sánh đơn vị kg (case-insensitive: kg, Kg, KG...)
  function isKg(unit) {
    return unit && unit.toLowerCase() === 'kg';
  }

  function showLoading() { document.getElementById('loadingOverlay').classList.add('show'); }
  function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

  function showToast(msg, type) {
    type = type || 'info';
    var c = document.getElementById('toastContainer');
    var t = document.createElement('div');
    var icons = { success: '✅', error: '❌', info: 'ℹ️' };
    t.className = 'toast toast-' + type;
    t.innerHTML = '<span>' + (icons[type] || '') + '</span><span>' + msg + '</span>';
    c.appendChild(t);
    setTimeout(function () { if (t.parentNode) t.parentNode.removeChild(t); }, 4000);
  }

  function openModal(id) { document.getElementById(id).classList.add('show'); }
  function closeModal(id) { document.getElementById(id).classList.remove('show'); }

  function escapeHtml(s) {
    if (!s) return '';
    return s.toString().replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ============================================
  // NAVIGATION
  // ============================================

  function showSection(name) {
    document.querySelectorAll('.section').forEach(function (s) { s.classList.remove('active'); });
    document.querySelectorAll('.tab-btn').forEach(function (n) { n.classList.remove('active'); });
    document.getElementById('section-' + name).classList.add('active');
    document.getElementById('nav-' + name).classList.add('active');

    if (name === 'baogia') renderBaoGia();
    if (name === 'thucdon') { renderDayTabs(); renderMenu(); }
    if (name === 'bangke') renderWeekSummary();
  }

  // ============================================
  // 1. BÁO GIÁ
  // ============================================

  function renderBaoGia() {
    var container = document.getElementById('baogia-table-container');
    var data = STATE.baoGia;
    var keyword = (document.getElementById('searchBaoGia').value || '').toLowerCase();

    if (keyword) {
      data = data.filter(function (item) {
        return item.name.toLowerCase().indexOf(keyword) > -1;
      });
    }

    if (!data || data.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>' +
        (keyword ? 'Không tìm thấy thực phẩm phù hợp.' : 'Chưa có dữ liệu. Hãy thêm thủ công hoặc nhập từ Excel!') +
        '</p></div>';
      return;
    }

    var html = '<table><thead><tr>';
    html += '<th style="width:40px">STT</th><th>Tên thực phẩm</th><th>Đơn vị tính</th>';
    html += '<th>Giá thị trường</th><th>Giá tăng gia</th><th style="width:100px">Thao tác</th>';
    html += '</tr></thead><tbody>';

    data.forEach(function (item, idx) {
      var realIdx = STATE.baoGia.indexOf(item);
      var isProtected = STATE.PROTECTED_ITEMS.indexOf(item.name) > -1;
      html += '<tr id="bg-row-' + realIdx + '">';
      html += '<td class="text-center">' + (idx + 1) + '</td>';
      html += '<td>' + escapeHtml(item.name) + (isProtected ? ' <span style="font-size:10px;color:red;font-weight:bold" title="Hệ thống">(Mặc định)</span>' : '') + '</td>';
      html += '<td class="text-center">' + escapeHtml(item.unit) + '</td>';
      html += '<td class="text-right text-price">' + formatVND(item.marketPrice) + '</td>';
      html += '<td class="text-right text-price">' + formatVND(item.selfPrice) + '</td>';
      html += '<td class="actions-cell">';
      html += '<button class="btn btn-icon btn-sm btn-outline" onclick="startInlineEdit(' + realIdx + ')" title="Chỉnh sửa">✏️</button>';
      if (isProtected) {
        html += '<button class="btn btn-icon btn-sm" disabled style="opacity:0.3;cursor:not-allowed" title="Không thể xóa mục cố định">🔒</button>';
      } else {
        html += '<button class="btn btn-icon btn-sm btn-danger" onclick="deleteItem(' + realIdx + ')" title="Xóa">🗑️</button>';
      }
      html += '</td>';
      html += '</tr>';
    });

    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function filterBaoGia() { renderBaoGia(); }

  // Add Item
  function openAddItemModal() {
    document.getElementById('addItemModalTitle').textContent = '➕ Thêm Thực Phẩm';
    document.getElementById('editItemIndex').value = '';
    document.getElementById('itemName').value = '';
    document.getElementById('itemUnit').value = 'kg';
    document.getElementById('itemMarketPrice').value = '';
    document.getElementById('itemSelfPrice').value = '';
    openModal('addItemModal');
  }

  function saveItem() {
    var name = document.getElementById('itemName').value.trim();
    var unit = document.getElementById('itemUnit').value;
    var market = parseFloat(document.getElementById('itemMarketPrice').value) || 0;
    var self_ = parseFloat(document.getElementById('itemSelfPrice').value) || 0;

    if (!name) { showToast('Vui lòng nhập tên thực phẩm!', 'error'); return; }

    var editIdx = document.getElementById('editItemIndex').value;
    if (editIdx !== '') {
      STATE.baoGia[parseInt(editIdx)] = { name: name, unit: unit, marketPrice: market, selfPrice: self_ };
      showToast('Đã cập nhật thực phẩm!', 'success');
    } else {
      STATE.baoGia.push({ name: name, unit: unit, marketPrice: market, selfPrice: self_ });
      showToast('Đã thêm: ' + name, 'success');
    }

    closeModal('addItemModal');
    renderBaoGia();
  }

  // Inline Edit
  function startInlineEdit(idx) {
    var item = STATE.baoGia[idx];
    var row = document.getElementById('bg-row-' + idx);
    if (!row) return;

    var cells = row.querySelectorAll('td');
    cells[1].innerHTML = '<input class="inline-input" id="ie-name-' + idx + '" value="' + escapeHtml(item.name) + '">';
    cells[2].innerHTML = '<select class="inline-input" id="ie-unit-' + idx + '">' +
      ['kg', 'g', 'quả', 'mớ', 'bó', 'hộp', 'chai', 'lít', 'bịch', 'gói', 'lon'].map(function (u) {
        return '<option value="' + u + '"' + (u === item.unit ? ' selected' : '') + '>' + u + '</option>';
      }).join('') + '</select>';
    cells[3].innerHTML = '<input class="inline-input" id="ie-market-' + idx + '" type="number" value="' + item.marketPrice + '">';
    cells[4].innerHTML = '<input class="inline-input" id="ie-self-' + idx + '" type="number" value="' + item.selfPrice + '">';
    cells[5].innerHTML =
      '<button class="btn btn-icon btn-sm btn-success" onclick="saveInlineEdit(' + idx + ')" title="Lưu">✓</button>' +
      '<button class="btn btn-icon btn-sm btn-secondary" onclick="renderBaoGia()" title="Hủy">✕</button>';
  }

  function saveInlineEdit(idx) {
    STATE.baoGia[idx] = {
      name: document.getElementById('ie-name-' + idx).value.trim(),
      unit: document.getElementById('ie-unit-' + idx).value,
      marketPrice: parseFloat(document.getElementById('ie-market-' + idx).value) || 0,
      selfPrice: parseFloat(document.getElementById('ie-self-' + idx).value) || 0
    };
    showToast('Đã cập nhật!', 'success');
    renderBaoGia();
  }

  // Delete
  function deleteItem(idx) {
    var item = STATE.baoGia[idx];
    if (item && STATE.PROTECTED_ITEMS.indexOf(item.name) > -1) {
      showToast('Không thể xóa mục cố định của hệ thống!', 'error');
      return;
    }
    STATE.baoGia.splice(idx, 1);
    showToast('Đã xóa!', 'success');
    renderBaoGia();
  }

  // Clear All
  function showConfirmClearAll() { openModal('confirmClearModal'); }
  function confirmClearAll() {
    STATE.baoGia = STATE.baoGia.filter(function (item) {
      return STATE.PROTECTED_ITEMS.indexOf(item.name) > -1;
    });
    closeModal('confirmClearModal');
    showToast('Đã xóa toàn bộ, giữ lại các mục hệ thống!', 'success');
    renderBaoGia();
  }

  // Excel Import
  function handleExcelImport(evt) {
    var file = evt.target.files[0];
    if (!file) return;

    showLoading();
    var reader = new FileReader();
    reader.onload = function (e) {
      try {
        var data = new Uint8Array(e.target.result);
        var workbook = XLSX.read(data, { type: 'array' });
        var sheetName = workbook.SheetNames[0];
        var sheet = workbook.Sheets[sheetName];
        var json = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        var count = 0;
        for (var i = 1; i < json.length; i++) {
          var row = json[i];
          if (!row || !row[0]) continue;
          var name = (row[0] || '').toString().trim();
          if (!name) continue;
          var unit = (row[1] || 'kg').toString().trim();
          var market = parseFloat(row[2]) || 0;
          var self_ = parseFloat(row[3]) || 0;

          var existingIdx = -1;
          for (var j = 0; j < STATE.baoGia.length; j++) {
            if (STATE.baoGia[j].name === name) {
              existingIdx = j;
              break;
            }
          }

          if (existingIdx !== -1) {
            STATE.baoGia[existingIdx].unit = unit;
            STATE.baoGia[existingIdx].marketPrice = market;
            STATE.baoGia[existingIdx].selfPrice = self_;
          } else {
            STATE.baoGia.push({ name: name, unit: unit, marketPrice: market, selfPrice: self_ });
          }
          count++;
        }

        hideLoading();
        showToast('Đã nhập ' + count + ' thực phẩm từ Excel!', 'success');
        renderBaoGia();
      } catch (err) {
        hideLoading();
        showToast('Lỗi đọc file: ' + err.message, 'error');
      }
    };
    reader.readAsArrayBuffer(file);
    evt.target.value = '';
  }

  // ============================================
  // 2. THỰC ĐƠN TUẦN
  // ============================================

  function renderDayTabs() {
    var html = '';
    STATE.DAYS.forEach(function (day, i) {
      html += '<button class="day-tab' + (i === STATE.currentDay ? ' active' : '') +
        '" onclick="selectDay(' + i + ')">' + day + '</button>';
    });
    document.getElementById('dayTabs').innerHTML = html;
  }

  function selectDay(idx) {
    STATE.currentDay = idx;
    renderDayTabs();
    renderMenu();
    renderDaySummary();
  }

  function selectMeal(meal) {
    STATE.currentMeal = meal;
    document.querySelectorAll('.meal-tab').forEach(function (t) { t.classList.remove('active'); });
    var mealClasses = { sang: 'morning', trua: 'noon', chieu: 'afternoon' };
    document.querySelector('.meal-tab.' + mealClasses[meal]).classList.add('active');
    renderMenu();
  }

  function getHeadcount(dayIdx, meal) {
    var dayName = STATE.DAYS[dayIdx];
    var hc = STATE.headcount[dayName];
    if (!hc) return 100;
    return hc[meal] || 100;
  }

  function renderMenu() {
    var d = STATE.currentDay;
    var m = STATE.currentMeal;
    var items = STATE.menuData[d][m];
    var hc = getHeadcount(d, m);

    // Update title
    var mealColors = { sang: '#F59E0B', trua: '#EF4444', chieu: '#10B981' };
    document.getElementById('menuTitle').innerHTML =
      '🍜 ' + STATE.DAYS[d] + ' - Buổi <span style="color:' + mealColors[m] + '">' + STATE.MEAL_NAMES[m] + '</span>';

    // Update headcount
    document.getElementById('headcountValue').textContent = hc;

    // Sync tiêu chuẩn input
    var tcInput = document.getElementById('inputTieuChuan');
    if (tcInput) tcInput.value = STATE.tieuChuan[d][m] || 0;

    var tbody = document.getElementById('menuBody');
    var html = '';

    var auto = getAutoCosts(d, m);

    // === HẠCH TOÁN MẶC ĐỊNH ===
    // 1. Chất đốt (Trích 5%)
    html += '<tr style="background:#F0FDFA">';
    html += '<td class="text-center" style="color:#0F766E;font-size:12px">MĐ1</td>';
    html += '<td><div style="font-weight:700;color:#0F766E">🔥 ' + escapeHtml(auto.fuel.name) + ' <span style="font-size:10px;color:#64748B;font-weight:normal">(Trích 5%)</span></div></td>';
    html += '<td><div class="badge badge-nha-thau" style="font-size:10px">Hệ thống</div></td>';
    html += '<td class="text-right" style="color:#64748B;font-size:12px">--</td>';
    html += '<td class="text-right"><span style="font-size:13px;font-weight:700;color:#15803D">--</span></td>';
    html += '<td class="text-right text-bold" style="color:#0F766E;font-size:13px">' + formatVND(auto.fuel.cost) + '</td>';
    html += '<td class="text-center"><span title="Mặc định do hệ thống tính" style="cursor:not-allowed;opacity:0.3">🔒</span></td>';
    html += '</tr>';

    // 2. Tạp chi gia vị (Ép chuẩn dư)
    html += '<tr style="background:#F8FAFC">';
    html += '<td class="text-center" style="color:#475569;font-size:12px">MĐ2</td>';
    html += '<td><div style="font-weight:700;color:#475569">🧂 ' + escapeHtml(auto.cond.name) + ' <span style="font-size:10px;color:#64748B;font-weight:normal">(Ép chuẩn dư)</span></div></td>';
    html += '<td><div class="badge badge-nha-thau" style="font-size:10px">Hệ thống</div></td>';
    html += '<td class="text-right" style="color:#64748B;font-size:12px">' + formatVND(auto.cond.price) + ' / ' + auto.cond.unit + '</td>';
    html += '<td class="text-right"><span style="font-size:13px;font-weight:700;color:#475569">--(Chính sách cân bằng)--</span></td>';
    html += '<td class="text-right text-bold" style="color:#475569;font-size:13px">' + formatVND(auto.cond.cost) + '</td>';
    html += '<td class="text-center"><span title="Mặc định do hệ thống tính" style="cursor:not-allowed;opacity:0.3">🔒</span></td>';
    html += '</tr>';

    // === MÓN ĂN THỦ CÔNG ===
    if (!items || items.length === 0) {
      html += '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-muted)">Chưa nhập thực phẩm nào trong bữa ăn này.</td></tr>';
    } else {
      items.forEach(function (item, idx) {
        html += buildMenuRow(item, idx, hc);
      });
    }

    tbody.innerHTML = html;

    updateMenuSummary();
    renderDaySummary();
  }

  function buildMenuRow(item, idx, hc) {
    var bgItem = findBaoGia(item.name);
    var unit = bgItem ? bgItem.unit : '';
    var price = 0;
    if (bgItem) {
      price = item.nguon === 'tang_gia' ? bgItem.selfPrice : bgItem.marketPrice;
    }

    var qty = parseFloat(item.qty) || 0;
    var totalPrice = 0;

    // qty luôn lưu theo đơn vị gốc nhập:
    //   - Nếu unit=kg: qty = số GRAM, tính tiền = price * (qty/1000) * hc
    //   - Nếu unit khác: qty = số lượng trực tiếp, tính tiền = price * qty * hc
    if (isKg(unit)) {
      totalPrice = price * (qty / 1000) * hc;
    } else {
      totalPrice = price * qty * hc;
    }

    var html = '<tr>';
    html += '<td class="text-center">' + (idx + 1) + '</td>';

    // Tên thực phẩm - dropdown
    html += '<td><select class="form-control" style="font-size:12px;padding:6px 8px" onchange="updateMenuItem(' + idx + ',\'name\',this.value)">';
    html += '<option value="">-- Chọn --</option>';
    STATE.baoGia.forEach(function (bg) {
      html += '<option value="' + escapeHtml(bg.name) + '"' + (bg.name === item.name ? ' selected' : '') + '>' + escapeHtml(bg.name) + '</option>';
    });
    html += '</select></td>';

    // Nguồn cung
    html += '<td><select class="form-control" style="font-size:12px;padding:6px 8px" onchange="updateMenuItem(' + idx + ',\'nguon\',this.value)">';
    html += '<option value="nha_thau"' + (item.nguon !== 'tang_gia' ? ' selected' : '') + '>Nhà thầu</option>';
    html += '<option value="tang_gia"' + (item.nguon === 'tang_gia' ? ' selected' : '') + '>Tăng gia</option>';
    html += '</select></td>';

    // Đơn giá + đơn vị
    var priceDisplay = price > 0 ? (formatVND(price) + ' / ' + (unit || '?')) : '--';
    html += '<td class="text-right text-price" style="font-size:12px">' + priceDisplay + '</td>';

    // === ĐỊNH LƯỢNG / 1 NGƯỜI ===
    html += '<td>';
    if (isKg(unit)) {
      // TÁCH 2 Ô: Ô xám nhập gram | Ô xanh hiển thị kg
      var kgConverted = qty > 0 ? (qty / 1000).toFixed(2) : '0.00';
      html += '<div class="qty-split">';
      // Ô xám: nhập gram (hỗ trợ số thập phân)
      html += '<div style="display:flex;align-items:center;gap:2px;flex:1">';
      html += '<input type="number" step="any" value="' + (qty > 0 ? qty : '') + '" placeholder="gram" ';
      html += 'oninput="updateQtyInline(' + idx + ',this.value)" ';
      html += 'style="width:70px;padding:5px 6px;border:1px solid #CBD5E1;border-radius:6px;font-size:13px;text-align:right;background:#F1F5F9;color:#334155;outline:none;font-family:Inter,sans-serif">';
      html += '<span style="font-size:12px;font-weight:600;color:#64748B;min-width:14px">g</span>';
      html += '</div>';
      // Ô xanh: hiển thị kg (chỉ đọc)
      html += '<div style="display:flex;align-items:center;gap:2px">';
      html += '<span id="kgDisplay_' + idx + '" style="padding:5px 8px;background:#DCFCE7;border:1px solid #BBF7D0;border-radius:6px;font-size:13px;font-weight:700;color:#15803D;white-space:nowrap;min-width:55px;text-align:right">' + kgConverted + '</span>';
      html += '<span style="font-size:12px;font-weight:600;color:#15803D;min-width:16px">kg</span>';
      html += '</div>';
      html += '</div>';
    } else if (unit) {
      // Đơn vị khác: 1 ô nhập duy nhất + label đơn vị (hỗ trợ số thập phân)
      html += '<div style="display:flex;align-items:center;gap:4px">';
      html += '<input type="number" step="any" class="form-control" style="font-size:13px;padding:5px 8px;width:70px;text-align:right" ';
      html += 'value="' + (qty > 0 ? qty : '') + '" placeholder="SL" oninput="updateQtyInline(' + idx + ',this.value)">';
      html += '<span style="font-size:12px;font-weight:600;color:#64748B">' + escapeHtml(unit) + '</span>';
      html += '</div>';
    } else {
      // Chưa chọn nguyên liệu
      html += '<span style="color:var(--text-muted);font-size:12px">--</span>';
    }
    html += '</td>';

    // Tổng tiền (có id để update inline)
    html += '<td id="totalCell_' + idx + '" class="text-right text-bold" style="color:#16A34A;font-size:13px">' + formatVND(totalPrice) + '</td>';

    // Thao tác
    html += '<td class="text-center"><button class="btn btn-icon btn-sm btn-danger" onclick="removeMenuItem(' + idx + ')" title="Xóa">✕</button></td>';

    html += '</tr>';
    return html;
  }

  function findBaoGia(name) {
    if (!name) return null;
    for (var i = 0; i < STATE.baoGia.length; i++) {
      if (STATE.baoGia[i].name === name) return STATE.baoGia[i];
    }
    return null;
  }

  function addMenuRow() {
    var d = STATE.currentDay;
    var m = STATE.currentMeal;
    STATE.menuData[d][m].push({ name: '', nguon: 'nha_thau', qty: 0 });
    renderMenu();
  }

  function updateMenuItem(idx, field, value) {
    var d = STATE.currentDay;
    var m = STATE.currentMeal;
    STATE.menuData[d][m][idx][field] = value;
    renderMenu();
  }

  // Cập nhật qty INLINE — không re-render bảng, giữ nguyên focus
  function updateQtyInline(idx, rawValue) {
    var d = STATE.currentDay;
    var m = STATE.currentMeal;
    var numVal = parseFloat(rawValue) || 0;
    STATE.menuData[d][m][idx].qty = numVal;

    var item = STATE.menuData[d][m][idx];
    var bg = findBaoGia(item.name);
    if (!bg) return;

    var unit = bg.unit;
    var price = item.nguon === 'tang_gia' ? bg.selfPrice : bg.marketPrice;

      totalPrice = price * (numVal / 1000) * hc;

      var kgEl = document.getElementById('kgDisplay_' + idx);
      if (kgEl) kgEl.textContent = numVal > 0 ? (numVal / 1000).toFixed(2) : '0.00';
    } else {
      totalPrice = price * numVal * hc;

  // Tính các thông số tự động: Chất đốt (5%) và Tạp chi gia vị
  function getAutoCosts(dayIdx, meal) {
    var hc = getHeadcount(dayIdx, meal);
    var tc = getTieuChuan(dayIdx, meal);
    var tongTC = tc * hc;

    var fuelCost = tongTC * 0.05; // Mặc định 5% cho chất đốt

    var foodCost = 0;
    var items = STATE.menuData[dayIdx][meal] || [];
    items.forEach(function (item) {
      if (!item.name) return;
      var bg = findBaoGia(item.name);
      if (!bg) return;
      var price = item.nguon === 'tang_gia' ? bg.selfPrice : bg.marketPrice;
      var qty = parseFloat(item.qty) || 0;
      if (isKg(bg.unit)) {
        foodCost += price * (qty / 1000) * hc;
      } else {
        foodCost += price * qty * hc;
      }
    });

    var condCost = tongTC - fuelCost - foodCost;
    if (condCost < 0) condCost = 0; // Tránh âm tiền nếu bị lố

    var fuelBG = findBaoGia('Chất đốt');
    var condBG = findBaoGia('Tạp chi gia vị');
    var fuelPrice = fuelBG ? fuelBG.marketPrice : 0;
    var condPrice = condBG ? condBG.marketPrice : 0;

    var fuelQtyTotal = fuelPrice > 0 ? (fuelCost / fuelPrice) : 0;

    return {
      tongTC: tongTC,
      foodCost: foodCost,
      fuel: {
        name: 'Chất đốt',
        cost: fuelCost,
        qtyTotal: fuelQtyTotal,
        price: fuelPrice,
        unit: fuelBG ? fuelBG.unit : 'kg'
      },
      cond: {
        name: 'Tạp chi gia vị',
        cost: condCost,
        qtyTotal: 1, // Không cần định lượng cụ thể
        price: condPrice,
        unit: condBG ? condBG.unit : 'gói'
      }
    };
  }

  function calcMealTotal(dayIdx, meal) {
    var auto = getAutoCosts(dayIdx, meal);
    return auto.fuel.cost + auto.cond.cost + auto.foodCost;
  }

  function calcMealTotalPerPerson(dayIdx, meal) {
    var hc = getHeadcount(dayIdx, meal);
    if (hc === 0) return 0;
    return calcMealTotal(dayIdx, meal) / hc;
  }

  function updateTieuChuan(val) {
    var d = STATE.currentDay;
    var m = STATE.currentMeal;
    STATE.tieuChuan[d][m] = parseFloat(val) || 0;
    updateMenuSummary();
  }

  function getTieuChuan(dayIdx, meal) {
    if (STATE.tieuChuan[dayIdx] && STATE.tieuChuan[dayIdx][meal] !== undefined) {
      return STATE.tieuChuan[dayIdx][meal];
    }
    return STATE.DEFAULT_TIEU_CHUAN[meal] || 0;
  }

  function updateMenuSummary() {
    var d = STATE.currentDay;
    var m = STATE.currentMeal;
    var hc = getHeadcount(d, m);
    var tieuChuan = getTieuChuan(d, m);
    var tongTieuChuan = tieuChuan * hc;
    var thucTe = calcMealTotal(d, m);
    var du = tongTieuChuan - thucTe;

    document.getElementById('sumTongTieuChuan').textContent = formatVND(tongTieuChuan);
    document.getElementById('sumThucTe').textContent = formatVND(thucTe);

    var duEl = document.getElementById('sumDu');
    duEl.textContent = formatVND(du);
    // Highlight: dư dương = tốt, âm = vượt
    if (du < 0) {
      duEl.style.color = '#EF4444';
      duEl.closest('.summary-box').style.background = 'linear-gradient(135deg,#DC2626,#EF4444)';
    } else {
      duEl.style.color = '';
      duEl.closest('.summary-box').style.background = '';
    }

  function aggregateWeek() {
    var result = [];
    for (var d = 0; d < 7; d++) {
      var dayData = { day: STATE.DAYS[d], dayIdx: d, meals: {} };
      STATE.MEALS.forEach(function (meal) {
        var items = STATE.menuData[d][meal] || [];
        var hc = getHeadcount(d, meal);
        var ntTotal = 0, tgTotal = 0;
        var ntItems = [], tgItems = [];

        var auto = getAutoCosts(d, meal);

        if (auto.fuel.cost > 0) {
          ntItems.push({ name: auto.fuel.name, unit: auto.fuel.unit, qtyTotal: auto.fuel.qtyTotal, price: auto.fuel.price, amount: auto.fuel.cost, isAuto: true });
          ntTotal += auto.fuel.cost;
        }
        if (auto.cond.cost > 0) {
          ntItems.push({ name: auto.cond.name, unit: auto.cond.unit, qtyTotal: 0, price: auto.cond.price, amount: auto.cond.cost, isAuto: true });
          ntTotal += auto.cond.cost;
        }

        if (items.length === 0 && auto.tongTC === 0) {
          ntItems = [];
          ntTotal = 0;
        } else {
          items.forEach(function (item) {
            if (!item.name) return;
            var bg = findBaoGia(item.name);
            if (!bg) return;
            var price = item.nguon === 'tang_gia' ? bg.selfPrice : bg.marketPrice;
            var qty = parseFloat(item.qty) || 0;
            var amount = 0;
            var qtyTotal = 0;
            if (isKg(bg.unit)) {
              qtyTotal = (qty / 1000) * hc;
              amount = price * (qty / 1000) * hc;
            } else {
              qtyTotal = qty * hc;
              amount = price * qty * hc;
            }

            var row = { name: item.name, unit: bg.unit, qtyTotal: qtyTotal, price: price, amount: amount, nguon: item.nguon };
            if (item.nguon === 'tang_gia') { tgItems.push(row); tgTotal += amount; }
            else { ntItems.push(row); ntTotal += amount; }
          });
        }

        dayData.meals[meal] = {
          hc: hc,
          ntItems: ntItems, tgItems: tgItems,
          ntTotal: ntTotal, tgTotal: tgTotal,
          total: ntTotal + tgTotal
        };
      });
      result.push(dayData);
    }
    return result;
  }

  function exportDailyExcel() {
    var d = STATE.currentDay;
    var dayName = STATE.DAYS[d];
    var meals = ['sang', 'trua', 'chieu'];

    var grouped = { nha_thau: {}, tang_gia: {} };
    var tongDuToan = 0;
    var grandTotalNT = 0, grandTotalTG = 0;

    meals.forEach(function (meal) {
      var hc = getHeadcount(d, meal);
      var tieuChuan = getTieuChuan(d, meal);
      tongDuToan += tieuChuan * hc;

      var auto = getAutoCosts(d, meal);
      if (auto.fuel.cost > 0) {
        addItem(grouped.nha_thau, auto.fuel.name, 'đồng', 0, meal, 0, auto.fuel.cost, true);
        grandTotalNT += auto.fuel.cost;
      }
      if (auto.cond.cost > 0) {
        addItem(grouped.nha_thau, auto.cond.name, 'đồng', 0, meal, 0, auto.cond.cost, true);
        grandTotalNT += auto.cond.cost;
      }

      var items = STATE.menuData[d][meal] || [];
      items.forEach(function (item) {
        if (!item.name) return;
        var bg = findBaoGia(item.name);
        if (!bg) return;
        var src = item.nguon || 'nha_thau';
        var price = src === 'tang_gia' ? bg.selfPrice : bg.marketPrice;
        var qty = parseFloat(item.qty) || 0;

    var grandStyle = { font: { bold: true, sz: 12, color: { rgb: 'FFFFFF' } }, fill: { fgColor: { rgb: '0F766E' } }, border: cellBorder, alignment: { horizontal: 'right', vertical: 'center' }, numFmt: '#,##0' };
    rows.push([
      { v: 'TỔNG CỘNG THỰC CẤP', s: grandStyle }, '', '', '', '', '', '', '', '', '', '', '',
      { v: Math.round(grandTotalNT + grandTotalTG), s: Object.assign({}, grandStyle, { font: { bold: true, sz: 13, color: { rgb: 'FFFFFF' } }, numFmt: '#,##0' }) }
    ]);
    merges.push({ s: { r: rowIdx, c: 0 }, e: { r: rowIdx, c: 11 } });
    rowIdx++;

    // Footer info rows (Dự toán vs Thực cấp)
    var footerStyle = { font: { bold: true, sz: 11 }, alignment: { horizontal: 'right', vertical: 'center' }, numFmt: '#,##0' };
    rows.push(['', '', '', '', '', '', '', '', '', '', '', '', '']); rowIdx++;
    rows.push([{ v: 'Tổng dự toán tuần dự kiến:', s: Object.assign({}, footerStyle, { color: { rgb: '64748B' } }) }, '', '', '', '', '', '', '', '', '', '', '', { v: Math.round(tongDuToanTuan), s: Object.assign({}, footerStyle, { color: { rgb: '0F172A' } }) }]);
    merges.push({ s: { r: rowIdx, c: 0 }, e: { r: rowIdx, c: 11 } }); rowIdx++;
    
    rows.push([{ v: 'Đã chi nhà thầu:', s: Object.assign({}, footerStyle, { color: { rgb: '64748B' } }) }, '', '', '', '', '', '', '', '', '', '', '', { v: Math.round(grandTotalNT), s: Object.assign({}, footerStyle, { color: { rgb: '1D4ED8' } }) }]);
    merges.push({ s: { r: rowIdx, c: 0 }, e: { r: rowIdx, c: 11 } }); rowIdx++;
    
    rows.push([{ v: 'Chi quỹ tăng gia:', s: Object.assign({}, footerStyle, { color: { rgb: '64748B' } }) }, '', '', '', '', '', '', '', '', '', '', '', { v: Math.round(grandTotalTG), s: Object.assign({}, footerStyle, { color: { rgb: '059669' } }) }]);
    merges.push({ s: { r: rowIdx, c: 0 }, e: { r: rowIdx, c: 11 } }); rowIdx++;

    // Build workbook
    var ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!merges'] = merges;
    ws['!cols'] = [
      { wch: 5 }, { wch: 25 }, { wch: 6 }, { wch: 10 }, { wch: 9 }, { wch: 6 }, { wch: 6 }, { wch: 6 }, { wch: 6 }, { wch: 6 }, { wch: 6 }, { wch: 6 }, { wch: 14 }
    ];

    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Bảng kê tuần');

    // Download
    XLSX.writeFile(wb, 'Bang_Tong_Hop_Thuc_Pham_Tuan.xlsx');
    showToast('Đã xuất file Excel thành công!', 'success');
  }

  // ============================================
  // INIT
  // ============================================

  document.addEventListener('DOMContentLoaded', function () {
    // Load headcount from Google Sheets
    google.script.run
      .withSuccessHandler(function (hcData) {
        STATE.headcount = hcData || {};

        // Load tieu chuan from Google Sheets
        google.script.run
          .withSuccessHandler(function (tcData) {
            if (tcData) {
              for (var i = 0; i < STATE.DAYS.length; i++) {
                var dayName = STATE.DAYS[i];
                if (tcData[dayName]) {
                  STATE.tieuChuan[i].sang = tcData[dayName].sang || STATE.DEFAULT_TIEU_CHUAN.sang;
                  STATE.tieuChuan[i].trua = tcData[dayName].trua || STATE.DEFAULT_TIEU_CHUAN.trua;
                  STATE.tieuChuan[i].chieu = tcData[dayName].chieu || STATE.DEFAULT_TIEU_CHUAN.chieu;
                }
              }
            }
            // re-render if thucdon is active
            if (document.getElementById('section-thucdon').classList.contains('active')) {
              renderDayTabs();
              renderMenu();
            }
            renderBaoGia();
          })
          .withFailureHandler(function (err) {
            console.log('Lỗi tải tiêu chuẩn:', err);
            renderBaoGia();
          })
          .getTieuChuanData();
      })
      .withFailureHandler(function (err) {
        console.log('Lỗi tải headcount:', err);
        renderBaoGia();
      })
      .getHeadcountData();
  });
</script>

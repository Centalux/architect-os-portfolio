<style>
/* ============================================
   CSS.html - Trợ Lý Báo Phẩm
   Light theme, military-friendly UI
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #2E7D32;
  --primary-dark: #1B5E20;
  --primary-light: #4CAF50;
  --accent: #43A047;
  --bg: #F5F7FA;
  --bg-card: #FFFFFF;
  --bg-input: #F8F9FB;
  --text-primary: #1A1A2E;
  --text-secondary: #555;
  --text-muted: #999;
  --border: #E0E4EA;
  --border-focus: #2E7D32;
  --shadow: 0 4px 20px rgba(0,0,0,0.06);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --transition: all 0.25s ease;
  /* Meal colors */
  --morning: #E65100;
  --morning-bg: #FFF3E0;
  --morning-border: #FFCC80;
  --noon: #F9A825;
  --noon-bg: #FFFDE7;
  --noon-border: #FFF176;
  --evening: #1565C0;
  --evening-bg: #E3F2FD;
  --evening-border: #90CAF9;
  /* Report */
  --report-header: #2E4057;
  --report-header-light: #3D5A80;
  --danger: #E53935;
  --danger-bg: #FFEBEE;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.5;
  font-size: 14px;
}

/* ---- HEADER ---- */
.app-header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-brand .logo-icon {
  width: 42px; height: 42px;
  background: var(--primary);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #fff;
}
.header-brand h1 {
  font-size: 18px; font-weight: 800;
  color: var(--text-primary);
}
.header-brand h1 span { color: var(--primary); }
.header-brand p {
  font-size: 11px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.5px;
}

/* ---- TAB NAVIGATION ---- */
.tab-nav {
  display: flex;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 4px;
  gap: 2px;
}
.tab-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 18px;
  border: none; background: transparent;
  border-radius: 26px;
  font-family: inherit; font-size: 13px; font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}
.tab-btn:hover { background: #f0f0f0; }
.tab-btn.active {
  background: var(--primary);
  color: #fff;
  font-weight: 600;
  box-shadow: 0 2px 8px rgba(46,125,50,0.3);
}
.tab-btn .tab-icon { font-size: 15px; }

/* ---- MAIN CONTENT ---- */
.main-content {
  max-width: 960px;
  margin: 0 auto;
  padding: 20px 24px 40px;
}

.section { display: none; }
.section.active { display: block; animation: fadeIn 0.3s ease; }

/* ---- CARD ---- */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
}
.card-title {
  display: flex; align-items: center; gap: 12px;
}
.card-title .icon-box {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.icon-box.green { background: #E8F5E9; color: var(--primary); }
.icon-box.blue { background: #E3F2FD; color: #1565C0; }
.icon-box.orange { background: #FFF3E0; color: #E65100; }
.card-title h3 { font-size: 18px; font-weight: 700; }
.card-title p { font-size: 12px; color: var(--text-muted); }

/* ---- BUTTONS ---- */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px;
  border: none; border-radius: var(--radius-sm);
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: var(--transition);
}
.btn-primary {
  background: var(--primary); color: #fff;
  box-shadow: 0 2px 8px rgba(46,125,50,0.25);
}
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
.btn-success { background: #43A047; color: #fff; }
.btn-success:hover { background: #388E3C; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #C62828; }
.btn-outline {
  background: transparent; color: var(--text-secondary);
  border: 1.5px solid var(--border);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-ghost { background: transparent; color: var(--text-muted); border: none; }
.btn-ghost:hover { color: var(--danger); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon {
  width: 32px; height: 32px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm); font-size: 14px;
  border: 1px solid var(--border); background: var(--bg-card);
  color: var(--text-muted); cursor: pointer; transition: var(--transition);
}
.btn-icon:hover { border-color: var(--primary); color: var(--primary); }
.btn-icon.danger:hover { border-color: var(--danger); color: var(--danger); }

/* ---- FORM / INPUT ---- */
.input-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr auto;
  gap: 10px; align-items: end;
  margin-bottom: 20px;
  padding: 16px;
  background: var(--bg);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.input-group label {
  display: block; font-size: 11px; font-weight: 600;
  text-transform: uppercase; color: var(--text-muted);
  margin-bottom: 4px; letter-spacing: 0.3px;
}
.input-group label.highlight { color: var(--primary); }
.form-input {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  font-family: inherit; font-size: 13px;
  color: var(--text-primary);
  transition: var(--transition);
  outline: none;
}
.form-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(46,125,50,0.1);
}
.form-input::placeholder { color: #bbb; }
.btn-add-circle {
  width: 38px; height: 38px;
  border-radius: 50%; border: none;
  background: var(--text-primary); color: #fff;
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.btn-add-circle:hover { background: var(--primary); transform: scale(1.05); }

/* ---- SEARCH & ACTIONS ROW ---- */
.actions-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
}
.search-box {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); background: var(--bg-card);
  flex: 1; max-width: 360px;
}
.search-box input {
  border: none; outline: none; background: transparent;
  font-family: inherit; font-size: 13px; color: var(--text-primary);
  width: 100%;
}
.search-box input::placeholder { color: #bbb; }
.delete-all-btn {
  display: flex; align-items: center; gap: 6px;
  background: transparent; border: none;
  color: var(--danger); font-family: inherit;
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: var(--transition);
}
.delete-all-btn:hover { text-decoration: underline; }

/* ---- TABLE ---- */
.table-wrap { overflow-x: auto; border-radius: var(--radius); }
table {
  width: 100%; border-collapse: collapse;
  font-size: 13px;
}
thead th {
  padding: 10px 14px;
  text-align: left;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
}
thead th.right { text-align: right; }
thead th.center { text-align: center; }
tbody td {
  padding: 10px 14px;
  border-bottom: 1px solid #f0f2f5;
  color: var(--text-secondary);
  vertical-align: middle;
}
tbody td.right { text-align: right; }
tbody td.center { text-align: center; }
tbody tr:hover { background: #fafbfc; }
tbody tr:last-child td { border-bottom: none; }
.price-cell { color: var(--primary); font-weight: 600; }
.badge-lock {
  display: inline-block; padding: 2px 8px;
  border-radius: 10px; font-size: 10px; font-weight: 600;
  background: #E8F5E9; color: var(--primary);
  margin-left: 6px;
}

/* ---- EDIT ROW ---- */
.edit-input {
  width: 100%; padding: 5px 8px;
  border: 1px solid var(--primary);
  border-radius: 4px; font-size: 13px;
  font-family: inherit; outline: none;
}

/* ---- WEEK / DAY SELECTOR ---- */
.pill-row {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 12px;
}
.pill {
  padding: 7px 16px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--bg-card);
  font-family: inherit; font-size: 13px; font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer; transition: var(--transition);
}
.pill:hover { border-color: var(--primary); color: var(--primary); }
.pill.active {
  background: var(--text-primary);
  color: #fff;
  border-color: var(--text-primary);
}

/* ---- MEAL SECTION ---- */
.meal-section {
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 20px;
  overflow: hidden;
}
.meal-section.morning { border-color: var(--morning-border); }
.meal-section.noon { border-color: var(--noon-border); }
.meal-section.evening { border-color: var(--evening-border); }

.meal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.meal-section.morning .meal-header { background: var(--morning-bg); border-color: var(--morning-border); }
.meal-section.noon .meal-header { background: var(--noon-bg); border-color: var(--noon-border); }
.meal-section.evening .meal-header { background: var(--evening-bg); border-color: var(--evening-border); }

.meal-label {
  display: flex; align-items: center; gap: 8px;
  font-size: 16px; font-weight: 700;
}
.meal-section.morning .meal-label { color: var(--morning); }
.meal-section.noon .meal-label { color: var(--noon); }
.meal-section.evening .meal-label { color: var(--evening); }

.meal-stats {
  display: flex; gap: 14px;
}
.stat-box {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12px; color: var(--text-muted);
}
.stat-box input {
  width: 50px; border: none; outline: none;
  text-align: center; font-family: inherit;
  font-size: 13px; font-weight: 600;
  color: var(--text-primary); background: transparent;
}

.meal-body { padding: 16px 20px; }

/* ---- DISH CARD ---- */
.dish-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 14px;
  overflow: hidden;
}
.dish-title-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: #fafbfc;
  border-bottom: 1px solid var(--border);
}
.dish-title-row label {
  font-size: 12px; font-weight: 700;
  color: var(--text-muted); text-transform: uppercase;
  white-space: nowrap;
}
.dish-title-row input {
  flex: 1; border: none; outline: none;
  background: transparent; font-family: inherit;
  font-size: 14px; font-weight: 500;
  color: var(--text-primary);
}
.dish-title-row input::placeholder { color: #ccc; }
.dish-title-row .btn-remove-dish {
  background: transparent; border: none;
  color: var(--text-muted); cursor: pointer;
  font-size: 16px; padding: 4px;
  transition: var(--transition);
}
.dish-title-row .btn-remove-dish:hover { color: var(--danger); }

.ingredient-table {
  width: 100%; border-collapse: collapse;
}
.ingredient-table th {
  padding: 8px 10px;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  text-align: left;
}
.ingredient-table td {
  padding: 6px 10px;
  border-bottom: 1px solid #f5f5f5;
  font-size: 13px;
}
.ingredient-table select,
.ingredient-table input {
  width: 100%; padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: inherit; font-size: 12px;
  outline: none; background: var(--bg-card);
}
.ingredient-table select:focus,
.ingredient-table input:focus {
  border-color: var(--primary);
}
.qty-dual {
  display: flex; gap: 4px; align-items: center;
}
.qty-dual .qty-gram {
  flex: 1; background: #f5f5f5; text-align: right;
}
.qty-dual .qty-kg {
  flex: 1; background: #E8F5E9; text-align: right;
  color: var(--primary); font-weight: 600;
  border-color: #C8E6C9;
}
.qty-dual .qty-kg:read-only {
  cursor: default;
}

.add-ingredient-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 12px;
  background: transparent; border: none;
  color: var(--primary); font-family: inherit;
  font-size: 12px; font-weight: 600;
  cursor: pointer;
}
.add-ingredient-btn:hover { text-decoration: underline; }

.add-dish-btn {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; width: 100%; padding: 12px;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  background: transparent; font-family: inherit;
  font-size: 14px; font-weight: 500;
  color: var(--text-muted); cursor: pointer;
  transition: var(--transition);
}
.add-dish-btn:hover {
  border-color: var(--primary); color: var(--primary);
  background: #f8fff8;
}

/* ---- DAILY REPORT (in Thực đơn tab) ---- */
.daily-report {
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-top: 28px;
}
.daily-report-header {
  background: var(--report-header);
  color: #fff;
  padding: 18px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.daily-report-header h3 {
  font-size: 16px; font-weight: 700;
}
.daily-report-header small {
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 1px; opacity: 0.7;
}
.daily-report-body { padding: 20px 24px; background: var(--bg-card); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius-lg) var(--radius-lg); }

.summary-cards {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 16px; margin-bottom: 24px;
}
.summary-card {
  padding: 16px 20px;
  border-radius: var(--radius);
  text-align: center;
}
.summary-card.total {
  background: var(--report-header);
  color: #fff;
}
.summary-card.detail {
  background: var(--report-header-light);
  color: #fff;
}
.summary-card .label {
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.5px; opacity: 0.8;
  margin-bottom: 4px;
}
.summary-card .value {
  font-size: 24px; font-weight: 800;
}
.summary-card .sub-row {
  display: flex; justify-content: space-around; margin-top: 10px;
}
.summary-card .sub-item .sub-label {
  font-size: 10px; text-transform: uppercase; opacity: 0.7;
}
.summary-card .sub-item .sub-value {
  font-size: 18px; font-weight: 700;
}
.sub-item .sub-value.green { color: #81C784; }

.report-section-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; font-weight: 700;
  margin: 20px 0 10px;
}
.report-section-title .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--primary);
}
.report-section-title.blue .dot { background: #1565C0; }

.report-table {
  width: 100%; border-collapse: collapse;
  font-size: 12px; margin-bottom: 16px;
}
.report-table thead th {
  padding: 8px 10px;
  background: #f5f7fa;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase;
  border: 1px solid var(--border);
  color: var(--text-muted);
}
.report-table thead th.highlight { color: var(--primary); font-weight: 800; }
.report-table tbody td {
  padding: 8px 10px;
  border: 1px solid #eee;
  font-size: 12px;
}
.report-table tbody td.right { text-align: right; }
.report-table tfoot td {
  padding: 8px 10px;
  border: 1px solid var(--border);
  font-weight: 700;
  text-align: right;
  background: #fafbfc;
}
.report-table .empty-row td {
  text-align: center; color: var(--text-muted);
  padding: 20px; font-style: italic;
}

/* ---- WEEKLY REPORT (Tab 3) ---- */
.weekly-summary-cards {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 16px; margin-bottom: 24px;
}

.weekly-report-table {
  width: 100%; border-collapse: collapse;
  font-size: 12px; margin-bottom: 16px;
}
.weekly-report-table th {
  padding: 8px 10px;
  background: #f5f7fa;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase;
  border: 1px solid var(--border);
  color: var(--text-muted);
}
.weekly-report-table th.highlight { color: var(--primary); }
.weekly-report-table td {
  padding: 8px 10px;
  border: 1px solid #eee;
}
.weekly-report-table td.right { text-align: right; }
.weekly-report-table tfoot td {
  padding: 10px;
  border: 1px solid var(--border);
  font-weight: 700;
  text-align: right;
  background: #fafbfc;
  font-size: 13px;
}

.report-actions {
  display: flex; justify-content: center;
  gap: 16px; margin-top: 24px; flex-wrap: wrap;
}

/* ---- MODAL ---- */
.modal-overlay {
  display: none;
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  z-index: 1000;
  justify-content: center; align-items: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  width: 90%; max-width: 440px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  animation: slideUp 0.25s ease;
  text-align: center;
  padding: 32px 28px 24px;
}
.modal .modal-icon {
  font-size: 48px; margin-bottom: 12px;
}
.modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.modal p { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
.modal-actions {
  display: flex; gap: 10px; justify-content: center;
}
.modal-actions .btn { min-width: 100px; justify-content: center; }

/* ---- TOAST ---- */
.toast-container {
  position: fixed; top: 20px; right: 20px;
  z-index: 2000;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 12px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  color: #fff; box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 8px;
  animation: slideInRight 0.3s ease, fadeOut 0.3s ease 3.5s forwards;
  max-width: 360px;
}
.toast-success { background: #43A047; }
.toast-error { background: var(--danger); }
.toast-info { background: #1565C0; }

/* ---- LOADING ---- */
.loading-overlay {
  display: none;
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(2px);
  z-index: 3000;
  justify-content: center; align-items: center;
}
.loading-overlay.show { display: flex; }
.spinner {
  width: 40px; height: 40px;
  border: 4px solid #eee;
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

/* ---- EMPTY STATE ---- */
.empty-state {
  text-align: center; padding: 40px 20px;
  color: var(--text-muted);
}
.empty-state p { font-size: 13px; font-style: italic; }

/* ---- TOOLTIP ---- */
[data-tooltip] {
  position: relative; cursor: help;
}
[data-tooltip]:hover::after {
  content: attr(data-tooltip);
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%);
  background: #333; color: #fff;
  padding: 4px 10px; border-radius: 4px;
  font-size: 11px; white-space: nowrap;
  z-index: 10;
}

/* ---- ANIMATIONS ---- */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideInRight { from { opacity: 0; transform: translateX(80px); } to { opacity: 1; transform: translateX(0); } }
